spring:
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:./data/measurement_ledger.db
    username:
    password:

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: AUTO

server:
  port: 8080

logging:
  level:
    com.equip.mapper: debug